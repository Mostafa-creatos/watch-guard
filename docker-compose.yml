version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: watchguard-db
    environment:
      POSTGRES_DB: sharedexpenses
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sharedexpenses"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: watchguard-backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=sharedexpenses
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - spring.profiles.active=prod
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: watchguard-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
